# canhost 配置文件（SocketCAN）
#
# 说明：
# 1. 本文件用于 Linux CLI 工具 canhost。
# 2. 仅配置工具行为，不会替代 `ip link` 的总线速率设置。
# 3. PGN 与信号定义请参考：../dbc/J1939.dbc

# SocketCAN 接口名
interface=can0

# 目标节点（支持逗号分隔多节点）
# node_id=8
# node_id=8,9,10
node_id=8

# 主机源地址（SA）
sync.sa=0x55

# CANFD 选项（仅用于程序内部配置对齐）
canfd=1
canfd.brs=1
canfd.data_bitrate=4000000

# sync.<pgn>=<period_ms>
# 用于 `canhost trigger sync`，周期触发设备上传对应 PGN 数据
sync.0xff34=100  # 加速度
sync.0xff37=100  # 角速度
sync.0xff3d=100  # 横滚/俯仰
sync.0xff41=100  # 航向
sync.0xff46=100  # 四元数

# 如需关闭某个 PGN，同步注释掉该行即可
# sync.0xff5a=100

